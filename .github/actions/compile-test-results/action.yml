name: "Download and Process Artifacts"
description: "Downloads artifacts for a list of modules and prepares them for further steps."

inputs:
  modules:
    description: "A JSON list of modules to process"
    required: true
    type: string

  github_token:
    description: "GitHub token for API authentication"
    required: true
    type: string

runs:
  using: "composite"
  steps:
    - name: Iterate through modules and download artifacts
      shell: bash
      run: |
        # Set the GitHub token
        export GH_TOKEN="${{ inputs.github_token }}"

        # Ensure modules input is parsed correctly
        modules='${{ inputs.modules }}'
        echo "Processing modules: $modules"

        # List and fetch artifacts for the current workflow
        echo "Fetching artifacts for workflow run ID: ${{ github.run_id }}"
        artifacts=$(gh api -H "Authorization: token $GH_TOKEN" \
                           -H "Accept: application/vnd.github.v3+json" \
                           "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts")
        echo "Available artifacts:"
        echo "$artifacts" | jq -r '.artifacts[] | .name'
        
        # Process modules and match artifacts
        echo "$modules" | jq -r '.[]' | while read -r module; do
          echo "Processing module: $module"
          
          # Clean module name
          cleaned_name=$(basename "$module")
          echo "Cleaned module name: $cleaned_name"
        
          # Find artifact ID by name
          artifact_id=$(echo "$artifacts" | jq -r --arg name "${cleaned_name}_target" '
            .artifacts[] | select(.name == $name) | .id' | head -n 1)
        
          if [ -z "$artifact_id" ]; then
            echo "Artifact not found for $cleaned_name."
            exit 1
          fi
        
          # Download the artifact
          echo "Downloading artifact $cleaned_name (ID: $artifact_id)..."
          gh api -H "Authorization: token $GH_TOKEN" \
                 -H "Accept: application/vnd.github.v3+json" \
                 "/repos/${{ github.repository }}/actions/artifacts/$artifact_id/zip" > "${GITHUB_WORKSPACE}/${module}/target/${cleaned_name}_target.zip"
        
          # Unzip the artifact
          unzip "${GITHUB_WORKSPACE}/${module}/target/${cleaned_name}_target.zip" -d "${GITHUB_WORKSPACE}/${module}/target/"
          echo "Downloaded and extracted artifact for $module."

          # Debug directory listing after downloading and extracting the artifact
          # echo "Listing target directory for $module:"
          # ls "${GITHUB_WORKSPACE}/${module}/target/"
        done


