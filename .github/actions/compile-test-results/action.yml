name: "Compile Test Results"
description: "Iterates over a JSON list of modules and aggregates all test artifacts."

inputs:
  modules:
    description: "A JSON list of modules to process"
    required: true
    type: string

runs:
  using: "composite"
  steps:
    - name: Pre-process modules and name
      shell: bash
      run: |
        # Loop through each module using jq to parse the JSON input correctly
        for module in $(echo "$modules" | jq -r '.[]'); do
          echo "Processing module: $module"
          
          # Create the target directory
          mkdir -p "${GITHUB_WORKSPACE}/$module/target"
          
          # Clean Module Name (basename logic)
          cleaned_name=$(basename "$module")
          echo "Cleaned module name: $cleaned_name"

          # Debug directory listing before downloading the artifact
          echo "Listing target directory for $module:"
          ls "${GITHUB_WORKSPACE}/${module}/target/"
          
          # Call the action to download the artifact for each module
          echo "Downloading artifact for $cleaned_name..."
          # Use the cleaned_name to download the artifact
          actions/download-artifact@v4:
            name: "${cleaned_name}_target"
            path: "${GITHUB_WORKSPACE}/${module}/target/"
        done
    
