name: Download and Process Artifacts
description: Downloads artifacts for a list of modules and prepares them for further steps.
inputs:
  modules:
    description: A JSON list of modules to process
    required: true
  github_token:
    description: GitHub token for API authentication
    required: true

runs:
  using: composite
  steps:

    - name: Download and Restore Artifacts
      shell: bash
      run: |
        echo "Fetching all artifacts..."
        
        # List all artifacts
        artifacts=$(gh api -H "Accept: application/vnd.github.v3+json" \
        "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" | jq -r '.artifacts[] | .name')
        
        echo "Processing artifacts: $artifacts"
        
        # Download and restore each artifact
        for artifact in $artifacts; do
        echo "Processing artifact: $artifact"
  
        # Replace underscores with slashes
        original_name=$(echo "$artifact" | sed 's|_|/|g')
        echo "Restoring original name: $original_name"
  
        # Create a temp directory for extraction
        temp_dir="temp_artifact"
        mkdir -p "$temp_dir"
  
        # Download the artifact
        gh run download --name "$artifact" --dir "$temp_dir"
  
        # Move the extracted files to the original location
        target_dir="${original_name}/target"
        mkdir -p "$(dirname "$target_dir")"
        mv "$temp_dir"/* "$target_dir"
  
        # Clean up temp directory
        rm -rf "$temp_dir"
  
        echo "Restored artifact for: $original_name"
        done
        
        echo "All artifacts have been restored to their original locations."

#    - name: Download all artifacts
#      uses: actions/download-artifact@v4
#      with:
#        path: . #'${{ github.workspace }}'

    - name: List All Directories and Subdirectories
      shell: bash
      run: |
        TARGET_PATH="${GITHUB_WORKSPACE}"
        echo "Listing all directories and subdirectories under $TARGET_PATH:"
        find "$TARGET_PATH" -type d -exec ls -ld {} +

