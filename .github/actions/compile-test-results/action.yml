    - name: Download and Extract All Artifacts
      shell: bash
      env:
          GH_TOKEN: ${{ github.token }}
      run: |
        echo "Listing all available artifacts..."
        gh api -H "Authorization: token $GH_TOKEN" \
               -H "Accept: application/vnd.github.v3+json" \
               "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
        | jq -r '.artifacts[] | .name'
        
        echo "Downloading and extracting artifacts..."
        for artifact in $(gh api -H "Authorization: token $GH_TOKEN" \
                            -H "Accept: application/vnd.github.v3+json" \
                            "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
                          | jq -r '.artifacts[] | .name'); do
          
          echo "Processing artifact: $artifact"
          mkdir -p temp_download
          gh run download --name "$artifact" --dir temp_download
          
          original_name="${artifact//_//}" # Replace '_' back to '/'
          mkdir -p "temp_download/$original_name"
          mv "temp_download/$sanitized_name" "temp_download/$original_name"
          
          cp -r temp_download/* .
          rm -rf temp_download
        done
        echo "Artifacts restored to the workspace."

