# .github/actions/generate-modules/action.yml
name: 'Generate Modules List'
description: 'Generates a list of Maven modules'

inputs:
  ignored_modules:
    description: 'Comma-separated list of modules to ignore'
    required: true
    default: ''

outputs:
  modules_list:
    description: 'The generated comma-separated list of Maven modules'
    value: ${{ steps.list_modules.outputs.modules_list }}

runs:
  using: 'composite'
  steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'adopt'
          java-version: '11'

      - name: Debug - Print passed in ignored modules in a newline-separated list
        shell: bash
        run: |
          echo "Modules to ignore:"
          echo "${{ inputs.ignored_modules }}" | tr ',' '\n'

      - name: Find and list Maven modules
        id: list_modules
        shell: bash
        run: |
          echo "Listing all Maven modules in the project..."
          # Initialize an array to hold module names
          MODULES=()
          IGNORED_MODULES="${{ inputs.ignored_modules }}"

          # Convert the ignored modules list to an array
          IFS=',' read -r -a IGNORED_ARRAY <<< "$IGNORED_MODULES"

          # Find all pom.xml files in the repository
          while IFS= read -r pom; do
            # Parse the modules from the parent pom.xml files
            if grep -q "<modules>" "$pom"; then
              echo "Modules found in $pom:"
              # Extract module names between <modules> and </modules>
              MODULE_NAMES=$(sed -n '/<modules>/,/<\/modules>/p' "$pom" | grep -oP '<module>\K[^<]+')
              for module in $MODULE_NAMES; do
                # Check if the module is in the ignored list
                if [[ ! " ${IGNORED_ARRAY[@]} " =~ " ${module} " ]]; then
                  MODULES+=("$module")
                else
                  echo "Ignoring module: $module"
                fi
              done
            fi
          done < <(find . -name "pom.xml")

          # Convert the array to a comma-separated string
          MODULES_STR=$(IFS=, ; echo "${MODULES[*]}")
          
          # Set the modules as output
          echo "modules_list=$MODULES_STR" >> $GITHUB_OUTPUT
          echo "Done compiling module list..."

      - name: Debug - Print modules in a newline-separated list
        shell: bash
        run: |
          echo "Modules list generated:"
          echo "${{ steps.list_modules.outputs.modules_list }}" | tr ',' '\n'

