name: List Maven Modules

on:
  workflow_dispatch:

jobs:
  list-modules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          distribution: 'adopt'
          java-version: '11'

      - name: Define modules to ignore
        id: define_ignore_list
        run: |
          # Define a comma-separated list of modules to ignore
          IGNORED_MODULES="hapi-fhir-bom, hapi-deployable-pom, hapi-fhir-spring-boot-sample-client-apache, hapi-fhir-spring-boot-sample-client-okhttp, hapi-fhir-spring-boot-starter, hapi-fhir-spring-boot-samples, hapi-fhir-validation-resources-dstu2.1, hapi-fhir-structures-r4b, hapi-fhir-validation-resources-r4b, hapi-fhir-jpa, hapi-fhir-serviceloaders, hapi-fhir-storage-batch2-test-utilities, hapi-fhir-cli, hapi-fhir-dist, hapi-fhir-jacoco, hapi-fhir-server-cds-hooks, hapi-fhir-caching-testing, hapi-fhir-cli-app, hapi-fhir-karaf-features, hapi-fhir-karaf-integration-tests"
          echo "ignored_modules=$IGNORED_MODULES" >> $GITHUB_OUTPUT

      - name: Find and list Maven modules
        id: list_modules
        run: |
          echo "Listing all Maven modules in the project..."
          # Initialize an array to hold module names
          MODULES=()
          IGNORED_MODULES="${{ steps.define_ignore_list.outputs.ignored_modules }}"

          # Convert the ignored modules list to an array
          IFS=',' read -r -a IGNORED_ARRAY <<< "$IGNORED_MODULES"

          # Find all pom.xml files in the repository
          while IFS= read -r pom; do
            # Parse the modules from the parent pom.xml files
            if grep -q "<modules>" "$pom"; then
              echo "Modules found in $pom:"
              # Extract module names between <modules> and </modules>
              MODULE_NAMES=$(sed -n '/<modules>/,/<\/modules>/p' "$pom" | grep -oP '<module>\K[^<]+')
              for module in $MODULE_NAMES; do
                # Check if the module is in the ignored list
                if [[ ! " ${IGNORED_ARRAY[@]} " =~ " ${module} " ]]; then
                  MODULES+=("$module")
                else
                  echo "Ignoring module: $module"
                fi
              done
            fi
          done < <(find . -name "pom.xml")

          # Convert the array to a comma-separated string
          MODULES_STR=$(IFS=, ; echo "${MODULES[*]}")
          
          # Set the modules as output
          echo "modules=$MODULES_STR" >> $GITHUB_OUTPUT

      - name: Debug - Print modules in a newline-separated list
        run: |
          echo "Modules found:"
          echo "${{ steps.list_modules.outputs.modules }}" | tr ',' '\n'
        
      - name: Use Maven modules in subsequent step
        run: |
          echo "Modules from previous step: ${{ steps.list_modules.outputs.modules }}"
        env:
          MODULES: ${{ steps.list_modules.outputs.modules }}
