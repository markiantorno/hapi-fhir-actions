name: Detect and Run New Tests in Multi-Module Maven Project

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

jobs:
  detect-new-tests:
    runs-on: ubuntu-latest
    outputs:
      new_tests: ${{ steps.detect-tests.outputs.new_tests }}  # Explicitly setting output
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Detect new or modified test files in all modules
        id: find-tests
        run: |
          git fetch origin master
          new_test_files=$(git diff --name-only origin/master | grep 'src/test/java/.*\(Test\|IT\).java' || true)
          if [ -z "$new_test_files" ]; then
            echo "No new or modified test files found."
            exit 0
          fi
          echo "new_test_files=$new_test_files" >> $GITHUB_ENV

      - name: Detect new JUnit 5 test methods
        id: detect-tests
        run: |
          JUNIT_ANNOTATIONS='@Test|@ParameterizedTest|@RepeatedTest|@TestFactory|@TestTemplate|@TestMethodOrder'
          new_tests=""
          for file in $new_test_files; do
            echo "Processing $file"
            module_dir=$(echo "$file" | sed -E 's|/src/test/java/.*||')
            test_methods=$(awk -v annotations="$JUNIT_ANNOTATIONS" '
              BEGIN { RS=""; FS="\n" }
              {
                match($0, annotations)
                if (RSTART) {
                  while (getline > 0) {
                    if (match($0, /public.* ([a-zA-Z0-9_]+)\(/, arr)) {
                      print arr[1]
                      break
                    }
                  }
                }
              }
            ' "$file")
            if [ -n "$test_methods" ]; then
              for method in $test_methods; do
                new_tests="$new_tests $module_dir:$file:$method"
              done
            fi
          done
          new_tests=$(echo $new_tests | xargs)  # Trim whitespace
          echo "new_tests='$new_tests'"
          echo "new_tests=$new_tests" >> $GITHUB_OUTPUT  # Use new way to set output

  run-new-tests:
    needs: detect-new-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
  
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
  
      - name: Run new tests 50 times and the entire class 30 times
        run: |
          new_tests="${{ needs.detect-new-tests.outputs.new_tests }}"
          if [ -z "$new_tests" ]; then
            echo "No new or modified test methods found."
            exit 0
          fi
  
          mkdir -p test-results  # Directory to store logs
  
          for test in $new_tests; do
            module=$(echo $test | cut -d':' -f1)
            file=$(echo $test | cut -d':' -f2)
            method=$(echo $test | cut -d':' -f3)
  
            # Run individual test methods 50 times
            for i in $(seq 1 50); do
              echo "Running test method $method from $file, iteration $i"
              mvn -f $module/pom.xml -Dtest="$(basename $file .java)#${method}" test \
              | tee -a test-results/${method}_run_${i}.log  # Save each method run log uniquely per iteration
            done
  
            # Run the entire test class 30 times
            for i in $(seq 1 30); do
              echo "Running entire class $(basename $file .java), iteration $i"
              mvn -f $module/pom.xml -Dtest="$(basename $file .java)" test \
              | tee -a test-results/$(basename $file .java)_class_run_${i}.log  # Save each class run log uniquely per iteration
            done
          done

  
  generate-report:
    needs: 
      - run-new-tests
      - detect-new-tests
    runs-on: ubuntu-latest
    steps:
      - name: Generate report of new/modified tests with results
        run: |
          new_tests="${{ needs.detect-new-tests.outputs.new_tests }}"
          
          if [ -z "$new_tests" ]; then
            echo "No new or modified test methods found."
          else
            echo "======================================"
            echo "        New/Modified Test Report       "
            echo "======================================"
            echo ""
            echo "The following new/modified test methods were detected:"
            echo ""
  
            IFS=' ' read -r -a test_array <<< "$new_tests"
            for test in "${test_array[@]}"; do
              module=$(echo "$test" | cut -d':' -f1)
              file=$(echo "$test" | cut -d':' -f2)
              method=$(echo "$test" | cut -d':' -f3)
              
              echo "• Module: $module"
              echo "  File: $file"
              echo "  Test Method: $method"
              echo ""
  
              # Report for individual test method (50 runs)
              echo "    Test Method Results:"
              total_method_runs=0
              failed_method_runs=0
              for log in test-results/${method}_run_*.log; do
                total_method_runs=$((total_method_runs + 1))
                if grep -q "\[ERROR\]" "$log"; then
                  echo "    Method Run $(basename $log .log): FAILED"
                  failed_method_runs=$((failed_method_runs + 1))
                else
                  echo "    Method Run $(basename $log .log): PASSED"
                fi
              done
  
              echo "    Total method runs: $total_method_runs"
              echo "    Method Failures: $failed_method_runs"
              echo ""
  
              # Report for the entire class (30 runs)
              echo "    Entire Class Results:"
              total_class_runs=0
              failed_class_runs=0
              for log in test-results/$(basename $file .java)_class_run_*.log; do
                total_class_runs=$((total_class_runs + 1))
                if grep -q "\[ERROR\]" "$log"; then
                  echo "    Class Run $(basename $log .log): FAILED"
                  failed_class_runs=$((failed_class_runs + 1))
                else
                  echo "    Class Run $(basename $log .log): PASSED"
                fi
              done
  
              echo "    Total class runs: $total_class_runs"
              echo "    Class Failures: $failed_class_runs"
              echo ""
  
              # Parse test summary from the first run logs
              if [ -f "test-results/${method}_run_1.log" ]; then
                summary=$(grep -E 'Tests run:.*' test-results/${method}_run_1.log)
                echo "    Test Method Summary: $summary"
              fi
  
              if [ -f "test-results/$(basename $file .java)_class_run_1.log" ]; then
                summary=$(grep -E 'Tests run:.*' test-results/$(basename $file .java)_class_run_1.log)
                echo "    Class Test Summary: $summary"
              fi
  
              echo ""
            done
  
            echo "======================================"
            echo "End of report."
          fi
