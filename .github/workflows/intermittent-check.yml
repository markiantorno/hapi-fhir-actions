name: Detect and Run New Tests in Multi-Module Maven Project

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

jobs:
  detect-new-tests:
    runs-on: ubuntu-latest
    outputs:
      new_tests: ${{ steps.detect-tests.outputs.new_tests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Detect new or modified test files in all modules
        id: find-tests
        run: |
          git fetch origin master
          new_test_files=$(git diff --name-only origin/master | grep 'src/test/java/.*\(Test\|IT\).java' || true)
          if [ -z "$new_test_files" ]; then
            echo "No new or modified test files found."
            exit 0
          fi
          echo "new_test_files=$new_test_files" >> $GITHUB_ENV

      - name: Detect new JUnit 5 test methods
        id: detect-tests
        run: |
          JUNIT_ANNOTATIONS='@Test|@ParameterizedTest|@RepeatedTest|@TestFactory|@TestTemplate|@TestMethodOrder'
          new_tests=""
          for file in $new_test_files; do
            echo "Processing $file"
            module_dir=$(echo "$file" | sed -E 's|/src/test/java/.*||')
            test_methods=$(awk -v annotations="$JUNIT_ANNOTATIONS" '
              BEGIN { RS=""; FS="\n" }
              {
                match($0, annotations)
                if (RSTART) {
                  while (getline > 0) {
                    if (match($0, /public.* ([a-zA-Z0-9_]+)\(/, arr)) {
                      print arr[1]
                      break
                    }
                  }
                }
              }
            ' "$file")
            if [ -n "$test_methods" ]; then
              for method in $test_methods; do
                new_tests="$new_tests $module_dir:$file:$method"
              done
            fi
          done
          new_tests=$(echo $new_tests | xargs)  # Trim whitespace
          echo "new_tests='$new_tests'"
          echo "new_tests=$new_tests" >> $GITHUB_OUTPUT

  run-new-tests:
    needs: detect-new-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Debug log directories and permissions
        run: |
          echo "Current Directory: $(pwd)"
          ls -l
          mkdir -p test-results
          echo "After creating test-results directory:"
          ls -l
          chmod -R 777 test-results  # Ensure permissions are wide open for the test-results directory

      - name: Run new tests 50 times and the whole test class 30 times
        run: |
          new_tests="${{ needs.detect-new-tests.outputs.new_tests }}"
          if [ -z "$new_tests" ]; then
            echo "No new or modified test methods found."
            exit 0
          fi

          mkdir -p test-results

          for test in $new_tests; do
            module=$(echo $test | cut -d':' -f1)
            file=$(echo $test | cut -d':' -f2)
            method=$(echo $test | cut -d':' -f3)

            echo "Running test method $method from $file in module $module"
            
            # Run the individual test method 50 times
            for i in $(seq 1 50); do
              mvn -f $module/pom.xml -Dtest="$(basename $file .java)#${method}" test | tee test-results/${method}_run_$i.log
              echo "Log for method run $i created: test-results/${method}_run_$i.log"
            done

            # Run the entire class 30 times
            for i in $(seq 1 30); do
              mvn -f $module/pom.xml -Dtest="$(basename $file .java)" test | tee test-results/$(basename $file .java)_class_run_$i.log
              echo "Log for class run $i created: test-results/$(basename $file .java)_class_run_$i.log"
            done
          done

      - name: Debug log files
        run: |
          echo "Debugging log files in test-results directory"
          ls -l test-results

  generate-report:
    needs: 
        - run-new-tests
        - detect-new-tests
    runs-on: ubuntu-latest
    steps:
      - name: Generate report of new/modified tests
        run: |
          new_tests="${{ needs.detect-new-tests.outputs.new_tests }}"
          
          if [ -z "$new_tests" ]; then
            echo "No new or modified test methods found."
          else
            echo "======================================"
            echo "        New/Modified Test Report       "
            echo "======================================"
            echo ""
            echo "The following new/modified test methods were detected:"
            echo ""
  
            IFS=' ' read -r -a test_array <<< "$new_tests"
            for test in "${test_array[@]}"; do
              module=$(echo "$test" | cut -d':' -f1)
              file=$(echo "$test" | cut -d':' -f2)
              method=$(echo "$test" | cut -d':' -f3)
              
              echo "• Module: $module"
              echo "  File: $file"
              echo "  Test Method: $method"
              
              # Generate method run results
              echo ""
              if ls test-results/${method}_run_*.log 1> /dev/null 2>&1; then
                echo "    Test Method Results:"
                total_method_runs=$(ls test-results/${method}_run_*.log | wc -l)
                method_failures=$(grep -L "BUILD SUCCESS" test-results/${method}_run_*.log | wc -l)
                echo "    Total method runs: $total_method_runs"
                echo "    Method Failures: $method_failures"
              else
                echo "    WARNING: No method run logs found for $method!"
                echo "    Total method runs: 0"
                echo "    Method Failures: 0"
              fi

              # Generate class run results
              echo ""
              if ls test-results/$(basename $file .java)_class_run_*.log 1> /dev/null 2>&1; then
                echo "    Entire Class Results:"
                total_class_runs=$(ls test-results/$(basename $file .java)_class_run_*.log | wc -l)
                class_failures=$(grep -L "BUILD SUCCESS" test-results/$(basename $file .java)_class_run_*.log | wc -l)
                echo "    Total class runs: $total_class_runs"
                echo "    Class Failures: $class_failures"
              else
                echo "    WARNING: No class run logs found for $(basename $file .java)!"
                echo "    Total class runs: 0"
                echo "    Class Failures: 0"
              fi
              echo ""
            done
  
            echo "======================================"
            echo "End of report."
          fi
