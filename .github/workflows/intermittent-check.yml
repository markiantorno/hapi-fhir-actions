name: Detect and Run New Tests

on:
  pull_request:
    branches:
      - master

jobs:
  detect_new_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Find new or modified tests
        id: find_tests
        run: |
          JUNIT_ANNOTATIONS='@Test|@ParameterizedTest|@RepeatedTest|@TestFactory|@TestTemplate|@TestMethodOrder'
          new_tests=""
          echo "Detecting changes in files..."
          new_test_files=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '\(Test\.java\|IT\.java\)$')

          if [ -z "$new_test_files" ]; then
            echo "No test files modified."
            exit 0
          fi

          echo "Modified test files: $new_test_files"

          for file in $new_test_files; do
            echo "Processing $file"

            module_dir=$(echo "$file" | sed -E 's|/src/test/java/.*||')
            if [ ! -f "$file" ]; then
              echo "File $file does not exist."
              continue
            fi

            test_methods=$(awk -v RS='' "/$JUNIT_ANNOTATIONS/ {
                match(\$0, /public.* ([a-zA-Z0-9_]+)\(/, arr);
                if (arr[1] != "") print arr[1];
            }" "$file")

            if [ -n "$test_methods" ]; then
              for method in $test_methods; do
                new_tests="$new_tests $module_dir:$file:$method"
              done
            else
              echo "No test methods found in $file."
            fi
          done

          if [ -z "$new_tests" ]; then
            echo "No new or modified test methods found."
            echo "new_tests=" >> $GITHUB_ENV
          else
            echo "New/Modified test methods detected: $new_tests"
            echo "new_tests=$new_tests" >> $GITHUB_ENV
          fi

      - name: Generate report of new/modified tests
        run: |
          if [ -z "${{ env.new_tests }}" ]; then
            echo "No new or modified test methods found."
          else
            echo "New/Modified test methods detected: ${{ env.new_tests }}"
          fi
