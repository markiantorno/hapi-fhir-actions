name: Intermittent Check

on:
  pull_request:
    branches:
      - master

jobs:
  detect-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Detect new/modified test methods
      id: detect
      run: |
        JUNIT_ANNOTATIONS='@Test|@ParameterizedTest|@RepeatedTest|@TestFactory|@TestTemplate|@TestMethodOrder'
        new_tests=""
        
        for file in $new_test_files; do  # Correct the loop to use the actual file list
          echo "Processing $file"
        
          module_dir=$(echo "$file" | sed -E 's|/src/test/java/.*||')
          
          # Detect the test methods with JUnit annotations
          test_methods=$(awk -v RS='' '/@Test|@ParameterizedTest|@RepeatedTest|@TestFactory|@TestTemplate|@TestMethodOrder/ {
              match($0, /public.* ([a-zA-Z0-9_]+)\(/, arr);
              if (arr[1] != "") print arr[1];
          }' "$file")
        
          if [ -n "$test_methods" ]; then
            for method in $test_methods; do
              new_tests="$new_tests $module_dir:$file:$method"
            done
          fi
        done
        
        if [ -z "$new_tests" ]; then
          echo "No new or modified test methods found."
          exit 0
        else
          echo "new_tests=$new_tests"
          echo "$new_tests" >> $GITHUB_ENV  # Use environment file to pass variables between steps
        fi

  run-new-tests:
    runs-on: ubuntu-latest
    needs: detect-tests
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Generate report of new/modified tests
      run: |
        if [ -z "$new_tests" ]; then
          echo "No new or modified test methods found."
        else
          echo "New/Modified test methods detected: $new_tests"
        fi

    - name: Run detected test methods 50 times
      if: ${{ !env.new_tests == '' }}
      run: |
        for test in $new_tests; do
          module_dir=$(echo $test | cut -d: -f1)
          file=$(echo $test | cut -d: -f2)
          method=$(echo $test | cut -d: -f3)
          
          echo "Running test $method in $file 50 times"
          for i in {1..50}; do
            ./mvnw -pl $module_dir test -Dtest=$method
          done
        done

    - name: Run test files containing new tests 30 times
      if: ${{ !env.new_tests == '' }}
      run: |
        for test in $new_tests; do
          module_dir=$(echo $test | cut -d: -f1)
          file=$(echo $test | cut -d: -f2)
          
          echo "Running test file $file 30 times"
          for i in {1..30}; do
            ./mvnw -pl $module_dir test -Dtest=$file
          done
        done
