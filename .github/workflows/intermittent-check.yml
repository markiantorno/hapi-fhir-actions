name: Detect and Run New Tests in Multi-Module Maven Project

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - synchronize
      - reopened

jobs:
  detect-new-tests:
    runs-on: ubuntu-latest
    outputs:
      new_tests: ${{ steps.detect-tests.outputs.new_tests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Detect new or modified test files in all modules
        id: find-tests
        run: |
          git fetch origin master

          new_test_files=$(git diff --name-only origin/master | grep 'src/test/java/.*\(Test\|IT\).java' || true)

          if [ -z "$new_test_files" ]; then
            echo "No new or modified test files found."
            exit 0
          fi

          echo "new_test_files=$new_test_files" >> $GITHUB_ENV

      - name: Detect new JUnit 5 test methods
        id: detect-tests
        run: |
          JUNIT_ANNOTATIONS='@Test|@ParameterizedTest|@RepeatedTest|@TestFactory|@TestTemplate|@TestMethodOrder'

          new_tests=""
          for file in $new_test_files; do
            echo "Processing $file"

            module_dir=$(echo "$file" | sed -E 's|/src/test/java/.*||')
            
            test_diff=$(git diff origin/master -- "$file" | grep -E '^\+.*('$JUNIT_ANNOTATIONS')' -A 5 | grep -E 'public.*void\s+(\w+)\s*\(' || true)

            if [ -n "$test_diff" ]; then
              methods=$(echo "$test_diff" | grep -oP 'public.*void\s+\K\w+')
              for method in $methods; do
                new_tests="$new_tests $module_dir:$file:$method"
              done
            fi
          done

          if [ -z "$new_tests" ]; then
            echo "No new test methods found."
            exit 0
          else
            echo "new_tests=$new_tests"
            echo "::set-output name=new_tests::$new_tests"
          fi

      - name: Generate report of new/modified tests
        run: |
          if [ -z "$new_tests" ]; then
            echo "No new or modified test methods found."
          else
            echo "New/Modified test methods detected: $new_tests"
          fi

  run-tests:
    needs: detect-new-tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test_info: ${{ fromJson(needs.detect-new-tests.outputs.new_tests) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run new test methods 50 times
        run: |
          IFS=":" read -r module_dir file method <<< "${{ matrix.test_info }}"
          echo "Running new test method $method in $file under $module_dir"
          for i in {1..50}; do
            mvn -pl "$module_dir" -Dtest="${method}" test
          done

      - name: Run entire test file 30 times
        run: |
          IFS=":" read -r module_dir file method <<< "${{ matrix.test_info }}"
          echo "Running entire test file $file under $module_dir"
          for i in {1..30}; do
            mvn -pl "$module_dir" -Dtest="${file##*/%.java}" test
          done
