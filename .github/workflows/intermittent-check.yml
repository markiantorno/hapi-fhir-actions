name: Detect and Report New Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  detect-new-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Tests and Generate Logs
        run: |
          # Assuming Maven is used to run tests and generate logs
          mvn test

      - name: Detect new JUnit 5 test methods
        id: detect-tests
        run: |
          JUNIT_ANNOTATIONS='@Test|@ParameterizedTest|@RepeatedTest|@TestFactory|@TestTemplate|@TestMethodOrder'
          new_tests=""
          for file in $new_test_files; do
            echo "Processing $file"
            module_dir=$(echo "$file" | sed -E 's|/src/test/java/.*||')
            test_methods=$(awk -v annotations="$JUNIT_ANNOTATIONS" '
              BEGIN { RS=""; FS="\n" }
              {
                match($0, annotations)
                if (RSTART) {
                  while (getline > 0) {
                    if (match($0, /public.* ([a-zA-Z0-9_]+)\(/, arr)) {
                      print arr[1]
                      break
                    }
                  }
                }
              }
            ' "$file")
            if [ -n "$test_methods" ]; then
              for method in $test_methods; do
                new_tests="$new_tests $module_dir:$file:$method"
              done
            fi
          done
          new_tests=$(echo $new_tests | xargs)  # Trim whitespace
          echo "new_tests='$new_tests'"
          echo "new_tests=$new_tests" >> $GITHUB_OUTPUT

      - name: Debugging log files in test-results directory
        run: |
          echo "Debugging log files in test-results directory"
          ls -l test-results

      - name: Parse and Generate Report
        run: |
          log_dir="test-results"
          test_method="testConvertTwo"
          class_name="VersionConvertor_14_30Test"
          
          method_run_count=0
          method_failures=0
          class_run_count=0
          class_failures=0

          # Check for test method logs
          test_method_logs=$(find "$log_dir" -name "${test_method}_run_*.log")
          class_logs=$(find "$log_dir" -name "${class_name}_class_run_*.log")

          # Count the number of method and class runs
          for log_file in $test_method_logs; do
            method_run_count=$((method_run_count + 1))
            if grep -q "FAILED" "$log_file"; then
              method_failures=$((method_failures + 1))
            fi
          done

          for log_file in $class_logs; do
            class_run_count=$((class_run_count + 1))
            if grep -q "FAILED" "$log_file"; then
              class_failures=$((class_failures + 1))
            fi
          done

          echo "======================================"
          echo "        New/Modified Test Report       "
          echo "======================================"
          echo ""
          echo "Detected new test method: $test_method"
          echo "Method run count: $method_run_count"
          echo "Method failures: $method_failures"
          echo ""
          echo "Class test runs for $class_name: $class_run_count"
          echo "Class test failures: $class_failures"
          echo ""
          echo "======================================"
          echo "        End of Report                 "
          echo "======================================"
          
      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        with:
          name: test-logs
          path: test-results/
