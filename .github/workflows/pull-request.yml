name: Pull Request Pipeline

on:
  workflow_dispatch:

jobs:
  generate-module-list:
    runs-on: ubuntu-latest
    outputs:
      modules_list: ${{ steps.format_modules.outputs.modules_list }}  # Reference the correct output step
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Generate Modules List
        id: generate_list
        uses: ./.github/actions/generate-module-list
        with:
          ignored_modules: 'hapi-fhir-bom,hapi-deployable-pom,hapi-fhir-spring-boot-sample-client-apache,hapi-fhir-spring-boot-sample-client-okhttp,hapi-fhir-spring-boot-starter,hapi-fhir-spring-boot-samples,hapi-fhir-validation-resources-dstu2.1,hapi-fhir-structures-r4b,hapi-fhir-validation-resources-r4b,hapi-fhir-jpa,hapi-fhir-serviceloaders,hapi-fhir-storage-batch2-test-utilities,hapi-fhir-cli,hapi-fhir-dist,hapi-fhir-jacoco,hapi-fhir-server-cds-hooks,hapi-fhir-caching-testing,hapi-fhir-cli-app,hapi-fhir-karaf-features,hapi-fhir-karaf-integration-tests'

      - name: Print generated modules
        run: |
          echo "Modules list generated:"
          echo "${{ steps.generate_list.outputs.modules_list }}" | tr ',' '\n'

      - name: Format Modules List as JSON Array
        id: format_modules
        run: |
          echo "modules_list=$(echo '${{ steps.generate_list.outputs.modules_list }}' | jq -R -s -c 'split(",")')" >> $GITHUB_OUTPUT

  build-modules:
    runs-on: ubuntu-latest
    needs: generate-module-list
    strategy:
      matrix:
        module: ${{ fromJSON(needs.generate-module-list.outputs.modules_list) }}
      max-parallel: 256

    steps:
      - name: Build Modules
        uses: ./.github/actions/build-modules
        with:
          module: ${{ matrix.module }}
